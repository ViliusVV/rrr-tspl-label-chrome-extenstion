name: Release

on:
  push:
    tags:
      - 'v*'
  # Allows running the workflow manually from the Actions tab against a tag/branch.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag is v$TAG_VERSION but package.json says $PKG_VERSION. Bump package.json and re-tag."
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build and zip
        run: npm run zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Mark as draft if dispatched manually so you can review before publishing;
          # automatic tag-pushes publish immediately.
          draft: ${{ github.event_name == 'workflow_dispatch' }}
