<!doctype html>
<html lang="en" data-i18n-title="app_title">
<head>
  <meta charset="UTF-8" />
  <title>Label printer</title>
  <link rel="stylesheet" href="/src/popup.css" />
</head>
<body>
<main id="app">
  <h1 data-i18n="app_title">Label printer</h1>

  <form id="settings">
    <fieldset class="main">
      <label><span data-i18n="width_mm">Width (mm)</span> <input type="number" id="widthMm" min="5" max="80" step="0.5" /></label>
      <label><span data-i18n="height_mm">Height (mm)</span> <input type="number" id="heightMm" min="5" max="200" step="0.5" /></label>
      <label><span data-i18n="copies">Copies</span> <input type="number" id="copies" min="1" max="99" /></label>
      <label class="checkbox">
        <span data-i18n="auto_fit">Auto-fit label</span>
        <input type="checkbox" id="autoFit" />
      </label>
    </fieldset>

    <details class="advanced">
      <summary data-i18n="advanced">Advanced</summary>
      <div class="advanced-body">
        <label><span data-i18n="gap_mm">Gap (mm)</span> <input type="number" id="gapMm" min="0" max="10" step="0.5" /></label>
        <label><span data-i18n="density">Density</span> <input type="number" id="density" min="1" max="15" /></label>
        <label><span data-i18n="speed">Speed</span> <input type="number" id="speed" min="1" max="10" /></label>
        <label>
          <span data-i18n="baud">Baud</span>
          <select id="baud">
            <option value="9600">9600</option>
            <option value="19200">19200</option>
            <option value="38400">38400</option>
            <option value="57600">57600</option>
            <option value="115200">115200</option>
          </select>
        </label>
        <label><span data-i18n="threshold">Threshold</span> <input type="number" id="threshold" min="0" max="255" /></label>
        <label>
          <span data-i18n="language">Language</span>
          <select id="language">
            <option value="en">English</option>
            <option value="lt">Lietuvių</option>
          </select>
        </label>
        <button id="changePort" type="button" data-i18n="change_port" hidden>Change port</button>
      </div>
    </details>
  </form>

  <div class="actions">
    <button id="connect" type="button" data-i18n="connect_printer">Connect printer</button>
    <button id="print" type="button" data-i18n="print" disabled>Print</button>
  </div>

  <p id="status" data-i18n="status_initialising">Initialising…</p>

  <div class="preview">
    <div class="preview-toolbar">
      <button id="resetViewBtn" type="button" data-i18n="reset_view_label" data-i18n-title="reset_view" title="Reset zoom and pan">100%</button>
      <button id="rotateBtn" type="button" data-i18n="rotate_90" data-i18n-title="rotate_90_title" title="Rotate 90°" hidden>⟳ Rotate 90°</button>
    </div>
    <div class="preview-viewport" id="previewViewport">
      <div class="preview-workarea" id="previewWorkarea">
        <div class="label-bounds" id="labelBounds">
          <img class="preview-raster" id="previewRaster" data-i18n-alt="label_preview_alt" alt="Label preview" />
        </div>
        <div class="manual-svg-wrapper" id="manualSvgWrapper" hidden>
          <img class="manual-svg-img" id="manualSvg" alt="" draggable="false" />
        </div>
      </div>
    </div>
    <p id="previewMsg"></p>
  </div>
</main>
<script type="module" src="/src/popup.ts"></script>
</body>
</html>
